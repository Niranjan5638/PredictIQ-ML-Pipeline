version: '3.8'

services:
  predictiq-api:
    build: .
    container_name: predictiq-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models   # mount models so you can update without rebuild
    environment:
      - ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", 
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  mlflow:
    image: python:3.11-slim
    container_name: mlflow-server
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      bash -c "pip install mlflow --quiet &&
               mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlruns"
    restart: unless-stopped
