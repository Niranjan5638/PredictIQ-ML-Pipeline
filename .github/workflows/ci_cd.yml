name: PredictIQ CICD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Manual trigger button

jobs:
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt pytest
      
      - name: Run pytest
        run: pytest tests/ -v --tb=short

  monitor:
    name: 🔍 Drift Monitoring
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install monitoring deps
        run: pip install pandas numpy scikit-learn evidently
    
      - name: Run drift detection
        run: python monitoring/monitor_drift.py

  retrain:
    name: 🤖 Auto-Retraining (Optuna + LightGBM)
    runs-on: ubuntu-latest
    needs: monitor
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install ML deps
        run: |
          pip install pandas==2.1.4 numpy lightgbm optuna mlflow scikit-learn joblib
      
      - name: 🔍 Verify dataset exists  # YOUR REQUEST
        run: |
          ls -la data/
          python -c "
          import pandas as pd
          df = pd.read_csv('data/masterfeatures_small.csv')
          print('✅ Dataset OK:', df.shape, 'rows')
          print('Labels:', df['label'].value_counts())
          print('Features:', [c for c in df.columns if c != 'label'][:10])
          "
      
      - name: 🚀 Run retraining pipeline
        run: python monitoring/retrain_pipeline.py
      
      - name: 📦 Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: lgbm-v1.1-model
          path: |
            models/lgbm_final_v1.1.pkl
            models/feature_cols_v1.1.pkl
          retention-days: 30

  build:
    name: 🐳 Docker Build & Test
    runs-on: ubuntu-latest
    needs: [test, monitor]
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker build -t predictiq:latest .
      
      - name: Test container health
        run: |
          docker run --rm predictiq:latest \
            python -c "import fastapi; print('✅ API framework OK')"

  deploy:
    name: 🚀 Deploy Preview
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: 🎉 Pipeline Success!
        run: |
          echo "✅ Full MLOps pipeline complete!"
          echo "📊 Model: AUC 0.9968 | GitHub: $(date)"
          echo "🔗 Repo: https://github.com/Niranjan5638/PredictIQ-ML-Pipeline"
